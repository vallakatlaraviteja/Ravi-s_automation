# Render.com Blueprint for n8n Job Automation
services:
  - type: web
    name: n8n-job-automation
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: WEBHOOK_URL
        sync: false
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: NODE_ENV
        value: production
      - key: EXECUTIONS_TIMEOUT
        value: 300
      - key: EXECUTIONS_TIMEOUT_MAX
        value: 600
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1

# Documentation:
# 1. Fork this repo or connect it to Render
# 2. In Render dashboard, set WEBHOOK_URL to: https://your-app-name.onrender.com/
# 3. Deploy
# 4. Access n8n at: https://your-app-name.onrender.com/
# 5. Import workflow from: workflow/ENHANCED-MASTER-workflow.json
# 6. Configure credentials (Groq, Gmail, Google Sheets, Telegram)
# 7. Update User Config node with your details
# 8. Activate workflow
